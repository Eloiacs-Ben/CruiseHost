
<style>
/* ================================================================
   KARAVAN CRUISES — Design System
   Matching reference: clean white/blue travel site
   Zero class name changes · All !important overrides
   ================================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@400;600;700;800;900&display=swap');

/* ================================================================
   TOKENS
   ================================================================ */
:root {
    /* Brand */
    --blue:          #1566C0 !important;
    --blue-dark:     #0E4F9A !important;
    --blue-light:    #EAF2FF !important;
    --blue-mid:      #2979C8 !important;

    /* Neutrals */
    --white:         #FFFFFF !important;
    --bg:            #F4F7FB !important;
    --bg-section:    #F8FAFD !important;
    --surface:       #FFFFFF !important;
    --border:        #DDE5EF !important;
    --border-light:  #EDF2F8 !important;

    /* Text */
    --text-dark:     #0E1F35 !important;
    --text-mid:      #2D4363 !important;
    --text-body:     #4A6080 !important;
    --text-muted:    #8499B4 !important;

    /* Accent */
    --gold:          #E09500 !important;
    --gold-bg:       #FFF8E6 !important;

    /* Fonts */
    --font-head:     'Nunito Sans', sans-serif !important;
    --font-body:     'Inter', sans-serif !important;

    /* Layout */
    --max-w:         1280px !important;

    /* Radii */
    --r-xs:   6px !important;
    --r-sm:   10px !important;
    --r-md:   14px !important;
    --r-lg:   20px !important;
    --r-xl:   28px !important;
    --r-pill: 999px !important;

    /* Shadows */
    --sh-xs:  0 1px 4px rgba(14,31,53,0.06) !important;
    --sh-sm:  0 2px 10px rgba(14,31,53,0.07), 0 1px 3px rgba(14,31,53,0.04) !important;
    --sh-md:  0 6px 20px rgba(14,31,53,0.09), 0 2px 6px rgba(14,31,53,0.05) !important;
    --sh-lg:  0 12px 36px rgba(14,31,53,0.11), 0 4px 12px rgba(14,31,53,0.06) !important;
    --sh-xl:  0 24px 56px rgba(14,31,53,0.14), 0 8px 20px rgba(14,31,53,0.07) !important;
    --sh-blue: 0 6px 20px rgba(21,102,192,0.3) !important;

    /* Transitions */
    --ease:   cubic-bezier(0.4, 0, 0.2, 1) !important;
    --t-fast: all 0.16s cubic-bezier(0.4,0,0.2,1) !important;
    --t-base: all 0.26s cubic-bezier(0.4,0,0.2,1) !important;
    --t-slow: all 0.42s cubic-bezier(0.4,0,0.2,1) !important;
}


/* ================================================================
   BASE
   ================================================================ */
*, *::before, *::after {
    box-sizing: border-box !important;
}

body {
    font-family: var(--font-body) !important;
    color: var(--text-body) !important;
    background: var(--bg) !important;
    -webkit-font-smoothing: antialiased !important;
    -moz-osx-font-smoothing: grayscale !important;
    font-size: 14px !important;
    line-height: 1.6 !important;
}


/* ================================================================
   HEADER — TOP BAR  (matches screenshot: dark bar, phone/email right)
   ================================================================ */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    :root {
        --primary-color: #0F172A !important;
        --secondary-color: #3B82F6 !important;
        --accent-color: #FACC15 !important;
        --text-primary: #1E293B !important;
        --text-secondary: #64748B !important;
        --bg-white: #FFFFFF !important;
        --bg-light: #F8FAF7 !important;
        --font-main: 'Plus Jakarta Sans', sans-serif !important;
    }

    /* Reset & Base */
    * {
        box-sizing: border-box !important;
    }

    .top-bar {
        background: var(--primary-color) !important;
        color: var(--bg-white) !important;
        padding: 10px 40px !important;
        display: flex !important;
        justify-content: flex-end !important;
        gap: 25px !important;
        font-family: var(--font-main) !important;
        font-size: 14px !important;
        font-weight: 500 !important;
    }

    .top-bar span {
        display: flex !important;
        align-items: center !important;
        gap: 8px !important;
        opacity: 0.9 !important;
    }

    .navbar {
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        padding: 20px 40px !important;
        background: var(--bg-white) !important;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05) !important;
        font-family: var(--font-main) !important;
        position: sticky !important;
        top: 0 !important;
        z-index: 1000 !important;
    }

    /* Logo */
    .logo a {
        display: flex !important;
        align-items: center !important;
        text-decoration: none !important;
    }

    .logo img {
        height: 60px !important;
        width: auto !important;
        transition: transform 0.3s ease !important;
    }

    .logo img:hover {
        transform: scale(1.05) !important;
    }

    /* Menu */
    .menu {
        list-style: none !important;
        display: flex !important;
        gap: 35px !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    .menu>li {
        position: relative !important;
        padding: 10px 0 !important;
    }

    .menu>li>a {
        text-decoration: none !important;
        color: var(--text-primary) !important;
        font-weight: 600 !important;
        font-size: 16px !important;
        transition: color 0.3s ease !important;
    }

    .menu>li:hover>a {
        color: var(--secondary-color) !important;
    }

    /* Submenu */
    .submenu {
        position: absolute !important;
        top: 100% !important;
        left: 0 !important;
        background: var(--bg-white) !important;
        min-width: 200px !important;
        list-style: none !important;
        padding: 15px 0 !important;
        margin: 0 !important;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1) !important;
        border-radius: 8px !important;
        opacity: 0 !important;
        visibility: hidden !important;
        transform: translateY(10px) !important;
        transition: all 0.3s ease !important;
        border: 1px solid #F1F5F9 !important;
    }

    .menu li:hover .submenu {
        opacity: 1 !important;
        visibility: visible !important;
        transform: translateY(0) !important;
    }

    .submenu li a {
        padding: 10px 25px !important;
        display: block !important;
        text-decoration: none !important;
        color: var(--text-secondary) !important;
        font-size: 15px !important;
        font-weight: 500 !important;
        transition: all 0.2s ease !important;
    }

    .submenu li a:hover {
        background: var(--bg-light) !important;
        color: var(--secondary-color) !important;
        padding-left: 30px !important;
    }

    /* Button */
    .btn {
        background: linear-gradient(135deg, var(--secondary-color) 0%, #2563EB 100%) !important;
        color: var(--bg-white) !important;
        padding: 12px 28px !important;
        border-radius: 50px !important;
        text-decoration: none !important;
        font-weight: 700 !important;
        font-size: 15px !important;
        transition: all 0.3s ease !important;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3) !important;
    }

    .btn:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4) !important;
        filter: brightness(1.1) !important;
    }

    @media (max-width: 1024px) {
        .menu {
            gap: 20px !important;
        }

        .top-bar {
            display: none !important;
        }
    }

/* ================================================================
   SECTION HEADING  (popularplacesheading)
   Matches: bold left-aligned title, small uppercase sub-label
   ================================================================ */
.cc-widget--content {
    font-family: var(--font-body) !important;
    padding-top: 56px !important;
    padding-bottom: 16px !important;
    background: var(--white) !important;
}

.textbox {
    max-width: var(--max-w) !important;
    margin: 0 auto !important;
    padding: 0 48px !important;
}

.textbox h2 {
    font-family: var(--font-head) !important;
    font-size: clamp(26px, 3vw, 38px) !important;
    font-weight: 800 !important;
    color: var(--text-dark) !important;
    margin: 0 !important;
    line-height: 1.15 !important;
    letter-spacing: -0.025em !important;
}

.textbox p {
    margin-top: 8px !important;
    margin-bottom: 0 !important;
}

.textbox p span {
    font-family: var(--font-body) !important;
    font-size: 12px !important;
    color: var(--text-muted) !important;
    font-weight: 500 !important;
    display: flex !important;
    align-items: center !important;
    gap: 10px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
}

.textbox p span::before {
    content: '' !important;
    width: 24px !important;
    height: 2px !important;
    background: var(--blue) !important;
    display: inline-block !important;
    border-radius: 2px !important;
    flex-shrink: 0 !important;
    transition: width 0.35s var(--ease) !important;
}

.textbox:hover p span::before {
    width: 40px !important;
}


/* ================================================================
   CRUISE GRID CARDS  (cruisegrid)
   Matches screenshot: photo cards with price tag top-left,
   cruise name + dates bottom-left, 3-column layout
   ================================================================ */
.cc-widget--panel {
    background: var(--white) !important;
    padding: 8px 0 64px !important;
    font-family: var(--font-body) !important;
}

.lp_trip {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 20px !important;
    max-width: var(--max-w) !important;
    margin: 0 auto 20px auto !important;
    padding: 0 48px !important;
}

.lp_trip_box {
    background-size: cover !important;
    background-position: center !important;
    height: 240px !important;
    border-radius: 0 !important;
    overflow: hidden !important;
    position: relative !important;
    transition: var(--t-slow) !important;
    box-shadow: var(--sh-sm) !important;
    cursor: pointer !important;
}

/* Gradient overlay — photo shows top, info readable at bottom */
.lp_trip_box::before {
    content: '' !important;
    position: absolute !important;
    inset: 0 !important;
    background: linear-gradient(
        180deg,
        rgba(10,22,40,0.08) 0%,
        rgba(10,22,40,0.00) 30%,
        rgba(10,22,40,0.00) 45%,
        rgba(10,22,40,0.72) 100%
    ) !important;
    z-index: 1 !important;
    transition: var(--t-base) !important;
}

.lp_trip_box:hover {
    transform: translateY(-6px) !important;
    box-shadow: var(--sh-lg) !important;
}

.lp_trip_box:hover::before {
    background: linear-gradient(
        180deg,
        rgba(10,22,40,0.05) 0%,
        rgba(10,22,40,0.00) 35%,
        rgba(10,22,40,0.00) 45%,
        rgba(10,22,40,0.80) 100%
    ) !important;
}

.lp_trip_box a {
    display: flex !important;
    flex-direction: column !important;
    height: 100% !important;
    width: 100% !important;
    text-decoration: none !important;
    color: var(--white) !important;
    position: relative !important;
    z-index: 2 !important;
    box-sizing: border-box !important;
}

/* Price badge — top-left, matches screenshot style exactly */
.lp_trip_box .price {
    order: -1 !important;
    position: relative !important;
    background: rgba(255,255,255,0.96) !important;
    color: var(--text-dark) !important;
    padding: 10px 16px 10px !important;
    font-family: var(--font-body) !important;
    font-weight: 500 !important;
    font-size: 11px !important;
    line-height: 1.35 !important;
    width: fit-content !important;
    border-radius: 0 0 var(--r-md) 0 !important;
    box-shadow: var(--sh-xs) !important;
    clip-path: none !important;
    transition: background 0.2s ease !important;
    letter-spacing: 0.01em !important;
}

.lp_trip_box .price span {
    display: block !important;
    font-family: var(--font-head) !important;
    font-size: 22px !important;
    font-weight: 900 !important;
    line-height: 1.1 !important;
    margin: 2px 0 0 !important;
    color: var(--blue) !important;
    letter-spacing: -0.03em !important;
}

.lp_trip_box:hover .price {
    background: rgba(255,255,255,1) !important;
}

/* Cruise line label */
.lp_trip_box .headline {
    margin-top: auto !important;
    padding: 0 16px 4px !important;
}

.lp_trip_box .headline span {
    font-family: var(--font-body) !important;
    font-size: 10.5px !important;
    font-weight: 600 !important;
    color: rgba(255,255,255,0.75) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
}

/* Trip name + dates */
.lp_trip_box .text {
    padding: 0 16px 18px !important;
}

.lp_trip_box .text div {
    font-family: var(--font-head) !important;
    font-size: 16px !important;
    font-weight: 800 !important;
    line-height: 1.25 !important;
    color: var(--white) !important;
    margin-bottom: 5px !important;
    letter-spacing: -0.02em !important;
    text-shadow: 0 1px 4px rgba(10,22,40,0.5) !important;
}

.lp_trip_box .period {
    font-family: var(--font-body) !important;
    font-size: 11.5px !important;
    color: rgba(255,255,255,0.72) !important;
    font-weight: 400 !important;
    display: flex !important;
    align-items: center !important;
    gap: 5px !important;
    margin-top: 8px;
}

.lp_trip_box .period::before {
    content: '📅' !important;
    font-size: 11px !important;
}


/* ================================================================
   CRUISE LIST CARDS  (cruuisedeatails)
   Matches screenshot: horizontal card, photo left,
   info right, pill badge, price, blue CTA
   ================================================================ */
#cc_lay_page {
    font-family: var(--font-body) !important;
    max-width: 1200px !important;
    margin: 40px auto !important;
    padding: 0 48px !important;
    background-color: transparent !important;
}

/* Sort bar */
#cc_lay_sort {
    margin-bottom: 2px !important;
    background: var(--white) !important;
    padding: 14px 22px !important;

}

.liste_box_sort {
    display: flex !important;

    align-items: center !important;
}

.liste_box_01.ng-binding {
    font-family: var(--font-body) !important;

}

}

#sort {
    font-family: var(--font-body) !important;

    font-size: 13px !important;

#sort:focus,
#sort:hover {

}

/* Card */
.liste_box {
    display: flex !important;
    background: var(--white) !important;

    margin-bottom: 2px !important;

   align-items: center !important;
   gap: 24px !important;

/* "find cruise" heading — small, uppercase label style */
.lay_01 h2 {
    font-family: var(--font-body) !important;
    font-size: 32px !important;
    
    text-transform: uppercase !important;
    letter-spacing: 0.14em !important;
    font-weight: 700 !important;
    margin-bottom: 20px !important;
    text-align: left !important;
    padding-bottom: 0 !important;
    Color: #1566C0  !important;
}

.lay_01 h2::after {
    display: none !important;
}

/* Radio/checkbox labels */
.radio-custom-label,
.checkbox-custom-label {
    font-family: var(--font-body) !important;
    font-size: 12.5px !important;
    font-weight: 600 !important;
    color: var(--text-body) !important;
    letter-spacing: 0.03em !important;
    text-transform: uppercase !important;
    cursor: pointer !important;
}

input[type="radio"]:checked + .radio-custom-label,
input[type="checkbox"]:checked + .checkbox-custom-label {
    color: var(--blue) !important;
    font-weight: 700 !important;
}

.lay_01_1,
.lay_01_2 {
    display: inline-flex !important;
    align-items: center !important;
    margin: 0 20px 16px 0 !important;
    gap: 6px !important;
}

/* Search field buttons — flat, sharp, with left accent on focus */
.searchbutton {
    font-family: var(--font-body) !important;
    background: var(--white) !important;
    color: var(--text-dark) !important;
    border: 1px solid var(--border) !important;
    border-radius: 0 !important;
    height: 44px !important;
    font-size: 13px !important;
    font-weight: 400 !important;
    padding: 0 14px !important;
    transition: var(--t-fast) !important;
    cursor: pointer !important;
    text-align: left !important;
    width: 100% !important;
    display: flex !important;
    align-items: center !important;
    outline: none !important;
    box-shadow: none !important;
    border-bottom-color: var(--border) !important;
    margin-bottom: 0 !important;
    position: relative !important;
}

.searchbutton:hover,
.searchbutton:focus {
    border-color: var(--blue) !important;
    background: var(--blue-light) !important;
    box-shadow: inset 3px 0 0 var(--blue) !important;
    color: var(--blue-dark) !important;
}

/* All search fields stacked with 1px bottom-only borders */
#areas .searchbutton,
#cruiselines .searchbutton,
#ships .searchbutton,
#durations .searchbutton,
#departures .searchbutton,
#arrivals .searchbutton {
    border-left: none !important;
    border-right: none !important;
    border-top: none !important;
    border-bottom: 1px solid var(--border) !important;
    background: transparent !important;
    padding-left: 4px !important;
    height: 46px !important;
    font-size: 13px !important;
    color: var(--text-body) !important;
}

#areas .searchbutton:hover,
#cruiselines .searchbutton:hover,
#ships .searchbutton:hover,
#durations .searchbutton:hover,
#departures .searchbutton:hover,
#arrivals .searchbutton:hover,
#areas .searchbutton:focus,
#cruiselines .searchbutton:focus,
#ships .searchbutton:focus,
#durations .searchbutton:focus,
#departures .searchbutton:focus,
#arrivals .searchbutton:focus {
    border-bottom-color: var(--blue) !important;
    background: var(--blue-light) !important;
    box-shadow: none !important;
    color: var(--blue-dark) !important;
}

/* Dropdowns — flat with sharp corners */
.searchlist {
    background: var(--white) !important;
    border-radius: 0 !important;
    box-shadow: 0 8px 32px rgba(14,31,53,0.12) !important;
    border: 1px solid var(--border) !important;
    padding: 16px !important;
    margin-top: 0 !important;
    z-index: 9999 !important;
}

/* Dropdown labels */
.search_headline label {
    font-family: var(--font-body) !important;
    font-size: 12px !important;
    font-weight: 700 !important;
    color: var(--text-dark) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.06em !important;
    border-left: 3px solid var(--blue) !important;
    padding-left: 10px !important;
    margin: 12px 0 8px !important;
    display: block !important;
}

.search_subline label {
    font-family: var(--font-body) !important;
    color: var(--text-body) !important;
    font-size: 13px !important;
    font-weight: 400 !important;
}

/* Helper chips inside dropdowns */
.helperButton {
    font-family: var(--font-body) !important;
    padding: 5px 12px !important;
    border-radius: 0 !important;
    border: 1px solid var(--border) !important;
    background: var(--white) !important;
    color: var(--text-body) !important;
    font-weight: 600 !important;
    font-size: 12px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.04em !important;
    transition: var(--t-fast) !important;
    cursor: pointer !important;
    margin: 3px !important;
}

.helperButton:hover {
    background: var(--blue) !important;
    color: var(--white) !important;
    border-color: var(--blue) !important;
}

/* Big blue search CTA — flat sharp rectangle */
.btnSearch {
    font-family: var(--font-body) !important;
    background: var(--blue) !important;
    color: var(--white) !important;
    border-radius: 0 !important;
    height: 48px !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    text-transform: none !important;
    letter-spacing: 0.02em !important;
    width: 100% !important;
    border: none !important;
    cursor: pointer !important;
    transition: var(--t-fast) !important;
    box-shadow: none !important;
    margin-top: 20px !important;
    position: relative !important;
    overflow: hidden !important;
}

.btnSearch::after {
    content: '' !important;
    position: absolute !important;
    inset: 0 !important;
    background: rgba(255,255,255,0) !important;
    transition: background 0.18s ease !important;
}

.btnSearch:hover {
    background: var(--blue-dark) !important;
    transform: none !important;
    box-shadow: none !important;
}

.btnSearch:hover::after {
    background: rgba(255,255,255,0.06) !important;
}

.btnSearch:disabled {
    background: #B0C4DE !important;
    color: rgba(255,255,255,0.7) !important;
    cursor: not-allowed !important;
}

/* Datepicker */
.datepicker {
    border-radius: 0 !important;
    font-family: var(--font-body) !important;
    border: 1px solid var(--border) !important;
    box-shadow: 0 8px 32px rgba(14,31,53,0.12) !important;
    padding: 10px !important;
}

.datepicker--cell.-selected-,
.datepicker--cell.-selected-.-current- {
    background: var(--blue) !important;
    color: var(--white) !important;
    border-radius: 0 !important;
}

.datepicker--cell.-current- {
    color: var(--blue) !important;
    font-weight: 700 !important;
}

.datepicker--cell:hover:not(.-selected-) {
    background: var(--blue-light) !important;
    border-radius: 0 !important;
    color: var(--blue) !important;
}

.datepicker--nav-title,
.datepicker--nav-action {
    font-family: var(--font-body) !important;
    color: var(--text-dark) !important;
    font-weight: 600 !important;
}

/* Hero right — image slider panel, completely flush */
.lp_ss_box04 {
    border-radius: 0 !important;
    overflow: hidden !important;
    box-shadow: none !important;
    height: 100% !important;
}

.lp_ss_box04 .lp_slider_box {
    border-radius: 0 !important;
    height: 100% !important;
    min-height: 420px !important;
}


/* ================================================================
   IMAGE SLIDER — POPULAR PLACES (Slider.html)
   Modern full-bleed carousel: sharp edges, bold scale on active,
   clean white arrow buttons, pill pagination
   ================================================================ */
.cc-widget--carousel {
    background: var(--white) !important;
    padding: 8px 0 56px !important;
    font-family: var(--font-body) !important;
}

.swiper {
    padding: 16px 48px 52px !important;
    overflow: visible !important;
}

/* Individual slide image */
.lp_slider_box {
    height: 380px !important;
    background-size: cover !important;
    background-position: center !important;
    border-radius: 0 !important;
    box-shadow: 0 4px 24px rgba(14,31,53,0.12) !important;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), box-shadow 0.4s cubic-bezier(0.4,0,0.2,1) !important;
    cursor: pointer !important;
    position: relative !important;
    overflow: hidden !important;
}

/* Subtle dark vignette bottom */
.lp_slider_box::before {
    content: '' !important;
    position: absolute !important;
    inset: 0 !important;
    background: linear-gradient(to bottom, transparent 60%, rgba(10,22,40,0.38) 100%) !important;
    z-index: 1 !important;
    transition: opacity 0.3s ease !important;
}

.lp_slider_box:hover::before {
    opacity: 0.6 !important;
}

/* Non-active slides: slightly dimmed and scaled down */
.swiper-slide:not(.swiper-slide-active) .lp_slider_box {
    opacity: 0.75 !important;
    transform: scale(0.97) !important;
    box-shadow: 0 2px 12px rgba(14,31,53,0.08) !important;
}

/* Active slide: full size, sharp blue border bottom accent */
.swiper-slide-active .lp_slider_box {
    opacity: 1 !important;
    transform: scale(1) !important;
    box-shadow: 0 8px 40px rgba(14,31,53,0.18) !important;
    border-bottom: 3px solid var(--blue) !important;
    z-index: 10 !important;
    outline: none !important;
}

/* Navigation arrows — square, sharp, white */
.swiper-button-next,
.swiper-button-prev {
    width: 44px !important;
    height: 44px !important;
    background: var(--white) !important;
    color: var(--text-dark) !important;
    border-radius: 0 !important;
    box-shadow: 0 2px 12px rgba(14,31,53,0.12) !important;
    transition: var(--t-fast) !important;
    border: 1px solid var(--border) !important;
    top: 50% !important;
}

.swiper-button-next:hover,
.swiper-button-prev:hover {
    background: var(--blue) !important;
    color: var(--white) !important;
    border-color: var(--blue) !important;
    transform: none !important;
    box-shadow: 0 4px 16px rgba(21,102,192,0.28) !important;
}

.swiper-button-next::after,
.swiper-button-prev::after {
    font-size: 14px !important;
    font-weight: 900 !important;
}

/* Pagination — minimal pill dots */
.swiper-pagination {
    bottom: 12px !important;
}

.swiper-pagination-bullet {
    width: 6px !important;
    height: 6px !important;
    background: var(--border) !important;
    opacity: 1 !important;
    border-radius: 3px !important;
    transition: var(--t-base) !important;
    margin: 0 3px !important;
}

.swiper-pagination-bullet-active {
    width: 28px !important;
    border-radius: 3px !important;
    background: var(--blue) !important;
}


/* ================================================================
   RESPONSIVE
   ================================================================ */
@media (max-width: 1100px) {
    .lp_trip {
        grid-template-columns: repeat(2, 1fr) !important;
        padding: 0 28px !important;
    }
}

@media (max-width: 1024px) {
    .navbar { padding: 0 24px !important; }
    .top-bar { padding: 7px 24px !important; }
    .textbox { padding: 0 28px !important; }
    .lp_ss_box03 { padding: 24px 20px !important; }
    #cc_lay_page { padding: 0 24px !important; }
}

@media (max-width: 768px) {
    .top-bar { display: none !important; }

    .lp_trip {
        grid-template-columns: 1fr !important;
        padding: 0 16px !important;
    }

    .lp_trip_box { height: 220px !important; }

    .cc-widget--panel { padding: 8px 0 40px !important; }

    .cc-widget--content {
        padding-top: 40px !important;
        padding-bottom: 12px !important;
    }

    .textbox { padding: 0 16px !important; }

    .textbox h2 { font-size: 24px !important; }

    .liste_box { flex-direction: column !important; }

    .liste_box_01 {
        width: 100% !important;
        min-width: unset !important;
        height: 200px !important;
    }

    .b_forward {
        position: static !important;
        margin-top: 16px !important;
    }

    .b_forward a {
        justify-content: center !important;
        width: 100% !important;
    }

    .button_favor {
        top: auto !important;
        bottom: 16px !important;
    }

    .liste_box_02 { padding: 16px !important; }

    .lp_slider_box { height: 260px !important; }

    .cc-widget--carousel { padding: 10px 0 48px !important; }

    .navbar { padding: 0 16px !important; height: 60px !important; }

    .menu { display: none !important; }
}

a:focus-visible,
button:focus-visible {
    outline: 2px solid var(--blue) !important;

   @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    :root {
        --primary-color: #0F172A !important;
        --secondary-color: #3B82F6 !important;
        --accent-color: #FACC15 !important;
        --text-primary: #1E293B !important;
        --text-secondary: #64748B !important;
        --bg-white: #FFFFFF !important;
        --bg-light: #F8FAF7 !important;
        --font-main: 'Plus Jakarta Sans', sans-serif !important;
        --container-width: 1280px !important;
        --border-radius: 16px !important;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05) !important;
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1) !important;
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1) !important;
    }

    body {
        font-family: var(--font-main) !important;
        background-color: #f1f5f9 !important;
        color: var(--text-primary) !important;
        margin: 0 !important;
        padding: 0 !important;
        line-height: 1.6 !important;
    }

    #layout {
        margin: 40px auto !important;
        padding: 0 20px !important;
    }

    #cc {
        background: var(--bg-white) !important;
        border-radius: var(--border-radius) !important;
        box-shadow: var(--shadow-lg) !important;
        overflow: hidden !important;
        padding: 40px !important;
    }

    /* Back Button & Breadcrumbs */
    #tpm {
        margin-bottom: 30px !important;
        display: flex !important;
        align-items: center !important;
    }

    #btn_back {
        display: inline-flex !important;
        align-items: center !important;
        padding: 10px 20px !important;
        background: var(--bg-light) !important;
        color: var(--primary-color) !important;
        text-decoration: none !important;
        border-radius: 10px !important;
        font-weight: 600 !important;
        transition: all 0.3s ease !important;
        border: 1px solid #e2e8f0 !important;
    }

    #btn_back:hover {
        background: var(--primary-color) !important;
        color: white !important;
        transform: translateX(-5px) !important;
    }

    #breadcrumbs {
        list-style: none !important;
        padding: 0 !important;
        margin: 20px 0 !important;
        display: flex !important;
        gap: 10px !important;
        font-size: 0.9rem !important;
        color: var(--text-secondary) !important;
    }

    #breadcrumbs li::after {
        content: '/' !important;
        margin-left: 10px !important;
        opacity: 0.5 !important;
    }

    #breadcrumbs li:last-child::after {
        content: '' !important;
    }

    #breadcrumbs a {
        color: var(--secondary-color) !important;
        text-decoration: none !important;
        font-weight: 500 !important;
    }

    #breadcrumbs a:hover {
        text-decoration: underline !important;
    }

    /* Summary Box */
    .page_box {
        background: linear-gradient(135deg, #1e293b 0%, #334155 100%) !important;
        border-radius: var(--border-radius) !important;
        margin-bottom: 40px !important;
        overflow: hidden !important;
        box-shadow: var(--shadow-md) !important;
    }

    .liste_box_02 {
        background: transparent !important;
        padding: 40px !important;
        color: white !important;
        
        grid-template-columns: auto auto 1fr !important;
        gap: 12px !important;
        align-items: center !important;
    }

    .liste_box_nights, .liste_box_date {
        text-align: center !important;
        border-right: 1px solid rgba(255,255,255,0.1) !important;
        padding-right: 40px !important;
    }

    .liste_box_nights em, .liste_box_date em {
        display: block !important;
        font-size: 3rem !important;
        font-style: normal !important;
        font-weight: 800 !important;
        line-height: 1 !important;
        color: var(--accent-color) !important;
    }

    .liste_box_headline {
        font-size: 1.8rem !important;
        font-weight: 700 !important;
        line-height: 1.3 !important;
    }

    .liste_box_headline em {
        font-style: normal !important;
        color: var(--accent-color) !important;
    }

    .liste_box_02 table {
        margin-top: 20px !important;
        width: 100% !important;
    }

    .liste_box_02 td {
        padding: 5px 0 !important;
        font-size: 0.95rem !important;
        color: rgba(255,255,255,0.8) !important;
    }

    /* Price Table */
    .page_offers_chk {
        background: #f8fafc !important;
        padding: 30px !important;
        border-radius: var(--border-radius) !important;
        margin-bottom: 40px !important;
        border: 1px solid #e2e8f0 !important;
    }

    .price_tbl {
        width: 100% !important;
        border-collapse: separate !important;
        border-spacing: 10px !important;
    }

    .price_tbl th {
        background: var(--bg-white) !important;
        color: var(--text-primary) !important;
        padding: 20px !important;
        border-radius: 12px !important;
        font-weight: 700 !important;
        text-align: center !important;
        box-shadow: var(--shadow-sm) !important;
        transition: all 0.3s ease !important;
        border: 1px solid #e2e8f0 !important;

    .price_tbl th:hover {
        border-color: var(--secondary-color) !important;
        color: var(--secondary-color) !important;
        transform: translateY(-2px) !important;
    }

    .price_tbl td {
        background: var(--bg-white) !important;
        padding: 25px !important;
        border-radius: 12px !important;
        text-align: center !important;
        font-size: 1.5rem !important;
        font-weight: 800 !important;
        color: var(--primary-color) !important;
        box-shadow: var(--shadow-sm) !important;
        cursor: pointer !important;
        transition: all 0.3s ease !important;
        border: 2px solid transparent !important;
    }

    .price_tbl td:hover {
        border-color: var(--secondary-color) !important;
        background: #eff6ff !important;
        transform: scale(1.05) !important;
        z-index: 10 !important;
    }

    .price_tbl small {
        display: block !important;
        margin-top: 15px !important;
        color: var(--text-secondary) !important;
        font-size: 0.85rem !important;
        text-align: right !important;
    }

    /* Cabin Selection Card */
    .page_offers_cabine {
        background: var(--bg-white) !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: var(--border-radius) !important;
        padding: 30px !important;
        margin-bottom: 25px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        box-shadow: var(--shadow-sm) !important;
    }

    .page_offers_cabine h4 {
        margin: 0 !important;
        font-size: 1.2rem !important;
        color: var(--primary-color) !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;

    .tbl_cabine {
        margin: 0 !important;
    }

    .b_cabine_box {
        display: flex !important;
        gap: 5px !important;
        background: #f1f5f9 !important;
        padding: 5px !important;
        border-radius: 10px !important;
    }

    .b_cabine_box_sub, .b_cabine_box_add {
        width: 32px !important;
        height: 32px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        background: white !important;
        border-radius: 6px !important;
        cursor: pointer !important;

        box-shadow: var(--shadow-sm) !important;

        background: var(--secondary-color) !important;
        color: white !important;
    }

    .b_cabine_box_sub::before { content: '-' !important; }
    .b_cabine_box_add::before { content: '+' !important; }

    /* Action Bar */
    .page_offers_flex_03 {
        display: flex !important;
        justify-content: flex-end !important;
        padding: 30px 0 !important;
        border-top: 2px dashed #e2e8f0 !important;
        margin-top: 40px !important;
    }

    .b_forward {
        background: var(--secondary-color) !important;
        color: white !important;
        padding: 16px 48px !important;
        border-radius: 12px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        cursor: pointer !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3) !important;

        align-items: center !important;

    .b_forward:hover {
        background: #2563eb !important;
        transform: translateY(-3px) !important;
        box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4) !important;
    }

    /* Tabs Navigation */
    .page_nav {
        position: sticky !important;
        top: 0 !important;
        background: rgba(255, 255, 255, 0.9) !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        z-index: 100 !important;
        border-bottom: 1px solid #e2e8f0 !important;
        margin: 40px -40px !important;
        padding: 0 40px !important;
    }

    #pagenav {
        display: flex !important;
        list-style: none !important;
        padding: 0 !important;
        margin: 0 !important;
        gap: 30px !important;
    }

    #pagenav li {
        padding: 20px 0 !important;
        cursor: pointer !important;
        font-weight: 600 !important;
        color: var(--text-secondary) !important;
        position: relative !important;
        transition: all 0.3s ease !important;
    }

    #pagenav li:hover, #pagenav li.active {
        color: var(--secondary-color) !important;
    }

    #pagenav li::after {
        content: '' !important;
        position: absolute !important;
        bottom: -1px !important;
        left: 0 !important;
        width: 0 !important;
        height: 3px !important;
        background: var(--secondary-color) !important;
        transition: all 0.3s ease !important;
        border-radius: 3px 3px 0 0 !important;
    }

    #pagenav li:hover::after {
        width: 100% !important;
    }

    .page_content {
        padding: 60px 0 !important;
        border-bottom: 1px solid #f1f5f9 !important;
        display: grid !important;
        
        gap: 60px !important;
