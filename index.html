<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* TOP BAR */
.top-bar {
  background: #0b1a2c;
  color: white;
  font-size: 12px;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
}

/* NAVBAR */
.navbar {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo a {
  font-size: 22px;
  font-weight: bold;
  color: #F58633;
  text-decoration: none;
}

/* MENU */
.menu {
  list-style: none;
  display: flex;
  gap: 25px;
}

.menu li {
  position: relative;
}

.menu a {
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* SUBMENU */
.submenu {
  display: none;
  position: absolute;
  background: white;
  top: 100%;
  left: 0;
  padding: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.menu li:hover .submenu {
  display: block;
}

/* BUTTON */
.btn {
  background: #50CAF2;
  color: white;
  padding: 10px 20px;
  border-radius: 5px;
  text-decoration: none;
}

 /*Search widegry*/

    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

    :root {
        --ds-primary-100: #FFF8E1 !important;
        --ds-primary-500: #D4AF37 !important;
        --ds-primary-600: #C9A227 !important;
        --ds-neutral-100: #F8F9FA !important;
        --ds-neutral-200: #E9ECEF !important;
        --ds-neutral-300: #DEE2E6 !important;
        --ds-neutral-600: #6C757D !important;
        --ds-neutral-700: #495057 !important;
        --ds-neutral-800: #343A40 !important;
        --ds-neutral-900: #212529 !important;
        --ds-font-primary: 'Poppins', sans-serif !important;
        --ds-font-secondary: 'Inter', sans-serif !important;
        --ds-radius-md: 12px !important;
        --ds-radius-lg: 20px !important;
        --ds-shadow-sm: 0 2px 6px rgba(0,0,0,0.08) !important;
        --ds-shadow-md: 0 6px 20px rgba(0,0,0,0.12) !important;
        --ds-gold-gradient: linear-gradient(135deg, #D4AF37, #FFD700) !important;
    }

    /* Base Layout Styles */

        border: 1px solid var(--ds-neutral-300) !important;
    }

    /* Headlines */
    .lay_01 h2 {
        font-family: var(--ds-font-secondary) !important;
        font-size: 36px !important;
        color: var(--ds-neutral-900) !important;
        text-transform: uppercase !important;
        letter-spacing: 2px !important;
        font-weight: 700 !important;
        margin-bottom: 30px !important;
        text-align: center !important;
        position: relative !important;
        padding-bottom: 15px !important;
    }

    .lay_01 h2::after {
        content: '' !important;
        position: absolute !important;
        bottom: 0 !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        width: 80px !important;
        height: 4px !important;
        background: var(--ds-primary-500) !important;
        border-radius: 2px !important;
    }

    /* Select Buttons (Dropdown triggers) */
    .searchbutton {
        background: #ffffff !important;
        color: var(--ds-neutral-800) !important;
        border: 1.5px solid var(--ds-neutral-300) !important;
        border-radius: var(--ds-radius-md) !important;
        height: 56px !important;
        font-size: 16px !important;
        font-weight: 500 !important;
        padding: 0 20px !important;
        transition: 0.3s ease !important;
        cursor: pointer !important;
        text-align: left !important;
        width: 100% !important;
        display: flex !important;
        align-items: center !important;
        outline: none !important;
    }

    .searchbutton:hover, .searchbutton:focus {
        border-color: var(--ds-primary-500) !important;
        background: var(--ds-primary-100) !important;
        box-shadow: 0 0 0 4px rgba(212,175,55,0.15) !important;
    }

    /* Search Dropdowns */
    .searchlist {
        background: #ffffff !important;
        border-radius: var(--ds-radius-md) !important;
        box-shadow: var(--ds-shadow-md) !important;
        border: 1px solid var(--ds-neutral-300) !important;
        padding: 24px !important;
        margin-top: 10px !important;
        z-index: 1000 !important;
    }

    /* Sub-buttons inside dropdowns */
    .helperButton {
        padding: 10px 20px !important;
        border-radius: 8px !important;
        border: 2px solid var(--ds-primary-500) !important;
        background: transparent !important;
        color: var(--ds-primary-500) !important;
        font-weight: 600 !important;
        text-transform: uppercase !important;
        font-size: 13px !important;
        transition: 0.3s !important;
        cursor: pointer !important;
        margin: 6px !important;
    }

    .helperButton:hover {
        background: var(--ds-primary-500) !important;
        color: #ffffff !important;
        box-shadow: var(--ds-shadow-sm) !important;
    }

    /* The Main Action Button */
    .btnSearch {
        background: var(--ds-gold-gradient) !important;
        color: #ffffff !important;
        border-radius: var(--ds-radius-md) !important;
        height: 64px !important;
        font-size: 20px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 1.5px !important;
        border: none !important;
        cursor: pointer !important;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        box-shadow: 0 4px 15px rgba(212,175,55,0.3) !important;
        width: 100% !important;
        margin-top: 25px !important;
    }

    .btnSearch:hover {
        transform: translateY(-3px) !important;
        box-shadow: 0 8px 25px rgba(212,175,55,0.4) !important;
        filter: brightness(1.05) !important;
    }

    .btnSearch:disabled {
        background: var(--ds-neutral-300) !important;
        color: var(--ds-neutral-600) !important;
        cursor: not-allowed !important;
        transform: none !important;
        box-shadow: none !important;
    }

    /* Form Controls */
    .radio-custom-label, .checkbox-custom-label {
        font-size: 16px !important;
        color: var(--ds-neutral-700) !important;
        padding-left: 10px !important;
        cursor: pointer !important;
        transition: 0.2s !important;
    }

    input[type="radio"]:checked + .radio-custom-label,
    input[type="checkbox"]:checked + .checkbox-custom-label {
        color: var(--ds-primary-500) !important;
        font-weight: 600 !important;
    }

    /* Headlines in dropdowns */
    .search_headline label {
        font-weight: 600 !important;
        color: var(--ds-neutral-900) !important;
        border-left: 4px solid var(--ds-primary-500) !important;
        padding-left: 14px !important;
        margin: 15px 0 !important;
        display: block !important;
        font-size: 17px !important;
    }

    .search_subline label {
        color: var(--ds-neutral-600) !important;
        font-size: 15px !important;
    }

    /* Layout Spacing */
    .lay_01_1, .lay_01_2 {
        display: inline-flex !important;
        align-items: center !important;
        margin: 0 30px 25px 0 !important;
    }

    .lay_floatleft {
        display: grid !important;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)) !important;
        gap: 25px !important;
        margin-top: 10px !important;
    }

    /* Custom Scrollbar for Dropdowns */
    .checkboxLayer::-webkit-scrollbar {
        width: 8px !important;
    }

    .checkboxLayer::-webkit-scrollbar-track {
        background: var(--ds-neutral-100) !important;
        border-radius: 10px !important;
    }

    .checkboxLayer::-webkit-scrollbar-thumb {
        background: var(--ds-neutral-300) !important;
        border-radius: 10px !important;
    }

    .checkboxLayer::-webkit-scrollbar-thumb:hover {
        background: var(--ds-neutral-600) !important;
    }

    /* Datepicker styling overrides */
    .datepicker {
        border-radius: var(--ds-radius-md) !important;
        font-family: var(--ds-font-primary) !important;
        border: 1px solid var(--ds-neutral-300) !important;
        box-shadow: var(--ds-shadow-md) !important;
        padding: 10px !important;
    }

    .datepicker--cell.-selected- {
        background: var(--ds-primary-500) !important;
        border-radius: 6px !important;
    }

    .datepicker--nav-title {
        font-weight: 600 !important;
        color: var(--ds-neutral-900) !important;
    }

   /* Premium Slider Design System Integration */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    :root {
        --sl-primary: #D4AF37 !important;
        --sl-primary-hover: #C9A227 !important;
        --sl-neutral-100: #F8F9FA !important;
        --sl-neutral-200: #E9ECEF !important;
        --sl-neutral-300: #DEE2E6 !important;
        --sl-neutral-800: #343A40 !important;
        --sl-shadow-lg: 0 20px 40px rgba(0,0,0,0.15) !important;
        --sl-radius-lg: 24px !important;
        --sl-transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1) !important;
    }

    /* Container Styling */
    .cc-widget--carousel {
        background-color: var(--sl-neutral-100) !important;
        padding: 60px 0 !important;
        font-family: 'Poppins', sans-serif !important;
    }

    .swiper {
        padding: 40px 10px 80px !important;
        overflow: visible !important;
    }

    /* Slider Box - Card Styling */
    .lp_slider_box {
        height: 500px !important;
        background-size: cover !important;
        background-position: center !important;
        border-radius: var(--sl-radius-lg) !important;
        box-shadow: 0 8px 20px rgba(0,0,0,0.06) !important;
        transition: var(--sl-transition) !important;
        cursor: pointer !important;
        position: relative !important;
        overflow: hidden !important;
        border: 2px solid transparent !important;
    }

    /* Elegant Overlay Gradient */
    .lp_slider_box::before {
        content: '' !important;
        position: absolute !important;
        inset: 0 !important;
        background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.6) 100%) !important;
        z-index: 1 !important;
        opacity: 0.8 !important;
        transition: opacity 0.3s !important;
    }

    /* Hover & Active States */
    .lp_slider_box:hover {
        transform: translateY(-15px) !important;
        box-shadow: var(--sl-shadow-lg) !important;
    }

    .lp_slider_box:hover::before {
        opacity: 0.5 !important;
    }

    .swiper-slide-active .lp_slider_box {
        transform: scale(1.08) !important;
        box-shadow: var(--sl-shadow-lg) !important;
        border-color: var(--sl-primary) !important;
        z-index: 10 !important;
    }

    /* Swiper Navigation Buttons - Premium Gold */
    .swiper-button-next, .swiper-button-prev {
        width: 60px !important;
        height: 60px !important;
        background: #ffffff !important;
        color: var(--sl-primary) !important;
        border-radius: 50% !important;
        box-shadow: 0 6px 15px rgba(0,0,0,0.1) !important;
        transition: all 0.3s ease !important;
        border: 1px solid var(--sl-neutral-200) !important;
    }

    .swiper-button-next:hover, .swiper-button-prev:hover {
        background: var(--sl-primary) !important;
        color: #ffffff !important;
        transform: scale(1.1) !important;
        box-shadow: 0 10px 25px rgba(212,175,55,0.3) !important;
    }

    .swiper-button-next::after, .swiper-button-prev::after {
        font-size: 22px !important;
        font-weight: 900 !important;
    }

    /* Pagination - Modern Pill Style */
    .swiper-pagination {
        bottom: 20px !important;
    }

    .swiper-pagination-bullet {
        width: 16px !important;
        height: 6px !important;
        background: var(--sl-primary) !important;
        opacity: 0.25 !important;
        border-radius: 4px !important;
        transition: all 0.4s ease !important;
        margin: 0 6px !important;
    }

    .swiper-pagination-bullet-active {
        width: 45px !important;
        opacity: 1 !important;
        background: var(--sl-primary) !important;
    }

    /* Mobile Optimization */
    @media (max-width: 800px) {
        .lp_slider_box {
            height: 380px !important;
        }
        .cc-widget--carousel {
            padding: 30px 0 !important;
        }
        .swiper {
            padding: 20px 5px 60px !important;
        }
    }
