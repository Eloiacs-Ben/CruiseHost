<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* TOP BAR */
.top-bar {
  background: #0b1a2c;
  color: white;
  font-size: 12px;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
}

/* NAVBAR */
.navbar {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo a {
  font-size: 22px;
  font-weight: bold;
  color: #F58633;
  text-decoration: none;
}

/* MENU */
.menu {
  list-style: none;
  display: flex;
  gap: 25px;
}

.menu li {
  position: relative;
}

.menu a {
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* SUBMENU */
.submenu {
  display: none;
  position: absolute;
  background: white;
  top: 100%;
  left: 0;
  padding: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.menu li:hover .submenu {
  display: block;
}

/* BUTTON */
.btn {
  background: #50CAF2;
  color: white;
  padding: 10px 20px;
  border-radius: 5px;
  text-decoration: none;
}
