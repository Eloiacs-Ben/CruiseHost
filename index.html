.top-bar span {

    align-items: center !important;
    gap: 8px !important;
    opacity: 0.85 !important;
    transition: var(--trans-fast) !important;
}

.top-bar span:hover {
    opacity: 1 !important;
}


/* ============================================================
   6. HEADER — Navbar
   ============================================================ */
.navbar {
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    padding: 0 48px !important;
    height: 72px !important;
    background: var(--c-white) !important;
    box-shadow: 0 1px 0 var(--c-border), var(--shadow-sm) !important;
    font-family: var(--font) !important;
    position: sticky !important;
    top: 0 !important;
    z-index: 1000 !important;
}

/* Logo */
.logo a {
    font-size: 20px !important;
    font-weight: 800 !important;
    color: var(--c-navy) !important;
    text-decoration: none !important;
    letter-spacing: -0.04em !important;
    text-transform: uppercase !important;
}

/* Nav Menu */
.menu {
    list-style: none !important;
    display: flex !important;
    gap: 4px !important;
    margin: 0 !important;
    padding: 0 !important;
    height: 100% !important;
    align-items: center !important;
}

.menu > li {
    position: relative !important;
    height: 100% !important;
    display: flex !important;
    align-items: center !important;
}

.menu > li > a {
    text-decoration: none !important;
    color: var(--c-navy-mid) !important;
    font-weight: 600 !important;
    font-size: 15px !important;
    padding: 8px 14px !important;
    border-radius: var(--radius-sm) !important;
    transition: var(--trans-fast) !important;
    white-space: nowrap !important;
}

.menu > li > a:hover,
.menu > li:hover > a {
    color: var(--c-blue) !important;
    background: var(--c-blue-pale) !important;
}

/* Dropdown */
.submenu {
    position: absolute !important;
    top: calc(100% + 8px) !important;
    left: 0 !important;
    background: var(--c-white) !important;
    min-width: 220px !important;
    list-style: none !important;
    padding: 8px !important;
    margin: 0 !important;
    box-shadow: var(--shadow-lg) !important;
    border-radius: var(--radius-md) !important;
    border: 1px solid var(--c-border) !important;
    opacity: 0 !important;
    visibility: hidden !important;
    transform: translateY(8px) !important;
    transition: var(--trans-base) !important;
}

.menu li:hover .submenu {
    opacity: 1 !important;
    visibility: visible !important;
    transform: translateY(0) !important;
}

.submenu li a {
    padding: 10px 16px !important;
    display: flex !important;
    align-items: center !important;
    text-decoration: none !important;
    color: var(--c-sub) !important;
    font-size: 14px !important;
    font-weight: 500 !important;
    border-radius: var(--radius-sm) !important;
    transition: var(--trans-fast) !important;
}

.submenu li a:hover {
    background: var(--c-bg) !important;
    color: var(--c-blue) !important;
    padding-left: 20px !important;
}

/* CTA Button */
.btn {
    background: var(--c-blue) !important;
    color: var(--c-white) !important;
    padding: 11px 26px !important;
    border-radius: var(--radius-pill) !important;
    text-decoration: none !important;
    font-weight: 700 !important;
    font-size: 14px !important;
    transition: var(--trans-base) !important;
    box-shadow: var(--shadow-blue) !important;
    white-space: nowrap !important;
    letter-spacing: 0.01em !important;
}

.btn:hover {
    background: #1D4ED8 !important;
    transform: translateY(-2px) !important;
    box-shadow: 0 12px 32px rgba(37,99,235,0.35) !important;
}

.textbox h2 {

    font-weight: 800 !important;
    color: var(--c-navy) !important;
    margin: 0 !important;
    line-height: 1.1 !important;
    letter-spacing: -0.04em !important;
}

.textbox p {
    margin-top: 14px !important;
    margin-bottom: 0 !important;
}

.textbox p span {
    font-size: 13px !important;
    color: var(--c-muted) !important;
    font-weight: 600 !important;
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
}

.textbox p span::before {
    content: '' !important;
    width: 32px !important;
    height: 2px !important;
    background: var(--c-blue) !important;
    display: inline-block !important;
    border-radius: 2px !important;
    transition: width 0.4s var(--ease) !important;
}

.textbox:hover p span::before {
    width: 56px !important;
}

.cc-widget--panel {

<script>
    (function() {
        /**
         * Forcefully removes absolute positioning from price sections
         * to maintain the premium stacked layout.
         */
        function fixPricePositioning() {
            const selectors = [
                '#cc .lp_trip_box div[class^="price"]',
                '#cc .lp_double_box div[class^="price"]'
            ];

            selectors.forEach(selector => {
                const elements = document.querySelectorAll(selector);
                elements.forEach(el => {
                    // Set to relative and use important to override inline styles or dynamic injections
                    el.style.setProperty('position', 'relative', 'important');
                    // Ensure the order property from our CSS is respected
                    el.style.setProperty('order', '-1', 'important');
                    // Adjust bottom spacing as requested
                    el.style.setProperty('bottom', '2%', 'important');
                });
            });
        }

        // Run on initial load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', fixPricePositioning);
        } else {
            fixPricePositioning();
        }

        // Run a few times shortly after to catch any late-loading widgets or dynamic content
        [500, 1000, 2000, 5000].forEach(delay => {
            setTimeout(fixPricePositioning, delay);
        });

        // Use MutationObserver to catch any dynamic style changes by external scripts
        const observer = new MutationObserver((mutations) => {
            fixPricePositioning();
        });

        observer.observe(document.body || document.documentElement, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style', 'class']
        });
    })();
