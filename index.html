<style>
/* ============================================================
   CRUISE DESIGN SYSTEM — Unified Global Stylesheet
   Modern, clean, consistent across all components
   All rules use !important to override platform defaults
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');

/* ============================================================
   1. DESIGN TOKENS — CSS Custom Properties
   ============================================================ */
:root {
    /* Brand Colors */
    --c-navy:        #0F172A !important;
    --c-navy-mid:    #1E293B !important;
    --c-navy-light:  #334155 !important;
    --c-blue:        #2563EB !important;
    --c-blue-light:  #3B82F6 !important;
    --c-blue-pale:   #EFF6FF !important;
    --c-gold:        #F59E0B !important;
    --c-gold-light:  #FCD34D !important;
    --c-gold-pale:   #FFFBEB !important;

    /* Neutral Scale */
    --c-white:       #FFFFFF !important;
    --c-bg:          #F8FAFC !important;
    --c-bg-soft:     #F1F5F9 !important;
    --c-border:      #E2E8F0 !important;
    --c-border-mid:  #CBD5E1 !important;
    --c-muted:       #94A3B8 !important;
    --c-sub:         #64748B !important;
    --c-text:        #1E293B !important;

    /* Typography */
    --font:          'Plus Jakarta Sans', sans-serif !important;

    /* Spacing */
    --max-width:     1280px !important;
    --radius-sm:     8px !important;
    --radius-md:     16px !important;
    --radius-lg:     24px !important;
    --radius-xl:     32px !important;
    --radius-pill:   100px !important;

    /* Elevation */
    --shadow-xs:     0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04) !important;
    --shadow-sm:     0 4px 12px rgba(15,23,42,0.06), 0 2px 4px rgba(15,23,42,0.04) !important;
    --shadow-md:     0 8px 24px rgba(15,23,42,0.08), 0 4px 8px rgba(15,23,42,0.04) !important;
    --shadow-lg:     0 20px 48px rgba(15,23,42,0.12), 0 8px 16px rgba(15,23,42,0.06) !important;
    --shadow-xl:     0 32px 64px rgba(15,23,42,0.16) !important;
    --shadow-blue:   0 8px 24px rgba(37,99,235,0.25) !important;
    --shadow-gold:   0 8px 24px rgba(245,158,11,0.3) !important;

    /* Transitions */
    --ease:          cubic-bezier(0.4, 0, 0.2, 1) !important;
    --trans-fast:    all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
    --trans-base:    all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    --trans-slow:    all 0.5s cubic-bezier(0.4, 0, 0.2, 1) !important;
}


/* ============================================================
   2. GLOBAL RESETS
   ============================================================ */
*, *::before, *::after {
    box-sizing: border-box !important;
}

body, .cc_limit_width {
    font-family: var(--font) !important;
    color: var(--c-text) !important;
    -webkit-font-smoothing: antialiased !important;
    -moz-osx-font-smoothing: grayscale !important;
}


/* ============================================================
   3. TYPOGRAPHY SCALE
   ============================================================ */
h1, h2, h3, h4, h5, h6 {
    font-family: var(--font) !important;
    font-weight: 800 !important;
    color: var(--c-navy) !important;
    line-height: 1.15 !important;
    letter-spacing: -0.03em !important;
}

h1 { font-size: clamp(40px, 5vw, 64px) !important; }
h2 { font-size: clamp(28px, 3.5vw, 48px) !important; }
h3 { font-size: clamp(20px, 2.5vw, 32px) !important; }
h4 { font-size: 22px !important; font-weight: 700 !important; }

p {
    font-family: var(--font) !important;
    color: var(--c-sub) !important;
    line-height: 1.7 !important;
    font-size: 16px !important;
}

a {
    font-family: var(--font) !important;
    transition: var(--trans-base) !important;
}


/* ============================================================
   4. LAYOUT UTILITIES
   ============================================================ */
.cc_limit_width {
    width: 100% !important;
}

.pagemaker-widget {
    overflow: hidden !important;
}


/* ============================================================
   5. HEADER — Top Bar
   ============================================================ */
.top-bar {
    background: var(--c-navy) !important;
    color: var(--c-white) !important;
    padding: 10px 48px !important;
    display: flex !important;
    justify-content: flex-end !important;
    gap: 28px !important;
    font-family: var(--font) !important;
    font-size: 13px !important;
    font-weight: 500 !important;
    letter-spacing: 0.01em !important;
}

.top-bar span {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
    opacity: 0.85 !important;
    transition: var(--trans-fast) !important;
}

.top-bar span:hover {
    opacity: 1 !important;
}


/* ============================================================
   6. HEADER — Navbar
   ============================================================ */
.navbar {
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    padding: 0 48px !important;
    height: 72px !important;
    background: var(--c-white) !important;
    box-shadow: 0 1px 0 var(--c-border), var(--shadow-sm) !important;
    font-family: var(--font) !important;
    position: sticky !important;
    top: 0 !important;
    z-index: 1000 !important;
}

/* Logo */
.logo a {
    font-size: 20px !important;
    font-weight: 800 !important;
    color: var(--c-navy) !important;
    text-decoration: none !important;
    letter-spacing: -0.04em !important;
    text-transform: uppercase !important;
}

/* Nav Menu */
.menu {
    list-style: none !important;
    display: flex !important;
    gap: 4px !important;
    margin: 0 !important;
    padding: 0 !important;
    height: 100% !important;
    align-items: center !important;
}

.menu > li {
    position: relative !important;
    height: 100% !important;
    display: flex !important;
    align-items: center !important;
}

.menu > li > a {
    text-decoration: none !important;
    color: var(--c-navy-mid) !important;
    font-weight: 600 !important;
    font-size: 15px !important;
    padding: 8px 14px !important;
    border-radius: var(--radius-sm) !important;
    transition: var(--trans-fast) !important;
    white-space: nowrap !important;
}

.menu > li > a:hover,
.menu > li:hover > a {
    color: var(--c-blue) !important;
    background: var(--c-blue-pale) !important;
}

/* Dropdown */
.submenu {
    position: absolute !important;
    top: calc(100% + 8px) !important;
    left: 0 !important;
    background: var(--c-white) !important;
    min-width: 220px !important;
    list-style: none !important;
    padding: 8px !important;
    margin: 0 !important;
    box-shadow: var(--shadow-lg) !important;
    border-radius: var(--radius-md) !important;
    border: 1px solid var(--c-border) !important;
    opacity: 0 !important;
    visibility: hidden !important;
    transform: translateY(8px) !important;
    transition: var(--trans-base) !important;
}

.menu li:hover .submenu {
    opacity: 1 !important;
    visibility: visible !important;
    transform: translateY(0) !important;
}

.submenu li a {
    padding: 10px 16px !important;
    display: flex !important;
    align-items: center !important;
    text-decoration: none !important;
    color: var(--c-sub) !important;
    font-size: 14px !important;
    font-weight: 500 !important;
    border-radius: var(--radius-sm) !important;
    transition: var(--trans-fast) !important;
}

.submenu li a:hover {
    background: var(--c-bg) !important;
    color: var(--c-blue) !important;
    padding-left: 20px !important;
}

/* CTA Button */
.btn {
    background: var(--c-blue) !important;
    color: var(--c-white) !important;
    padding: 11px 26px !important;
    border-radius: var(--radius-pill) !important;
    text-decoration: none !important;
    font-weight: 700 !important;
    font-size: 14px !important;
    transition: var(--trans-base) !important;
    box-shadow: var(--shadow-blue) !important;
    white-space: nowrap !important;
    letter-spacing: 0.01em !important;
}

.btn:hover {
    background: #1D4ED8 !important;
    transform: translateY(-2px) !important;
    box-shadow: 0 12px 32px rgba(37,99,235,0.35) !important;
}


/* ============================================================
   7. SECTION HEADINGS
   ============================================================ */
.cc-widget--content {
    font-family: var(--font) !important;
    padding: 72px 0 28px !important;
    background: var(--c-white) !important;
}

.textbox {
    max-width: var(--max-width) !important;
    margin: 0 auto !important;
    padding: 0 48px !important;
}

.textbox h2 {
    font-size: clamp(32px, 4vw, 52px) !important;
    font-weight: 800 !important;
    color: var(--c-navy) !important;
    margin: 0 !important;
    line-height: 1.1 !important;
    letter-spacing: -0.04em !important;
}

.textbox p {
    margin-top: 14px !important;
    margin-bottom: 0 !important;
}

.textbox p span {
    font-size: 13px !important;
    color: var(--c-muted) !important;
    font-weight: 600 !important;
    display: flex !important;
    align-items: center !important;
    gap: 12px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
}

.textbox p span::before {
    content: '' !important;
    width: 32px !important;
    height: 2px !important;
    background: var(--c-blue) !important;
    display: inline-block !important;
    border-radius: 2px !important;
    transition: width 0.4s var(--ease) !important;
}

.textbox:hover p span::before {
    width: 56px !important;
}


/* ============================================================
   8. CRUISE GRID CARDS
   ============================================================ */
.cc-widget--panel {
    background: var(--c-bg) !important;
    padding: 20px 0 80px !important;
    font-family: var(--font) !important;
}

.lp_trip {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 28px !important;
    max-width: var(--max-width) !important;
    margin: 0 auto 28px auto !important;
    padding: 0 48px !important;
}

.lp_trip_box {
    background-size: cover !important;
    background-position: center !important;
    height: 480px !important;
    border-radius: var(--radius-xl) !important;
    overflow: hidden !important;
    position: relative !important;
    transition: var(--trans-slow) !important;
    box-shadow: var(--shadow-md) !important;
}

.lp_trip_box::before {
    content: '' !important;
    position: absolute !important;
    inset: 0 !important;
    background: linear-gradient(
        180deg,
        rgba(15,23,42,0.15) 0%,
        rgba(15,23,42,0) 35%,
        rgba(15,23,42,0.85) 100%
    ) !important;
    z-index: 1 !important;
    transition: var(--trans-base) !important;
}

.lp_trip_box:hover {
    transform: translateY(-10px) !important;
    box-shadow: var(--shadow-xl) !important;
}

.lp_trip_box:hover::before {
    background: linear-gradient(
        180deg,
        rgba(15,23,42,0.1) 0%,
        rgba(15,23,42,0) 30%,
        rgba(15,23,42,0.92) 100%
    ) !important;
}

.lp_trip_box a {
    display: flex !important;
    flex-direction: column !important;
    height: 100% !important;
    width: 100% !important;
    text-decoration: none !important;
    color: var(--c-white) !important;
    position: relative !important;
    z-index: 2 !important;
    box-sizing: border-box !important;
}

/* Price Badge — top-left strip */
.lp_trip_box .price {
    order: -1 !important;
    position: relative !important;
    background: var(--c-gold) !important;
    color: var(--c-navy) !important;
    padding: 18px 24px 26px !important;
    font-family: var(--font) !important;
    font-weight: 700 !important;
    font-size: 11px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.08em !important;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 85%) !important;
    transition: background 0.25s ease !important;
    line-height: 1.4 !important;
}

.lp_trip_box .price span {
    display: block !important;
    font-size: 32px !important;
    font-weight: 800 !important;
    line-height: 1 !important;
    margin: 3px 0 !important;
    color: var(--c-navy) !important;
    letter-spacing: -0.03em !important;
}

.lp_trip_box:hover .price {
    background: var(--c-gold-light) !important;
}

/* Cruise line label */
.lp_trip_box .headline {
    margin-top: auto !important;
    padding: 0 24px 6px !important;
}

.lp_trip_box .headline span {
    font-size: 11px !important;
    font-weight: 700 !important;
    color: var(--c-gold-light) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.12em !important;
}

/* Trip name & dates */
.lp_trip_box .text {
    padding: 0 24px 28px !important;
}

.lp_trip_box .text div {
    font-size: 21px !important;
    font-weight: 700 !important;
    line-height: 1.25 !important;
    color: var(--c-white) !important;
    margin-bottom: 8px !important;
    letter-spacing: -0.02em !important;
}

.lp_trip_box .period {
    font-size: 13px !important;
    color: rgba(255,255,255,0.65) !important;
    font-weight: 500 !important;
    display: flex !important;
    align-items: center !important;
    gap: 6px !important;
}

.lp_trip_box .period::before {
    content: '📅' !important;
    font-size: 12px !important;
}


/* ============================================================
   9. CRUISE LIST CARDS (Search Results)
   ============================================================ */
#cc_lay_page {
    font-family: var(--font) !important;
    max-width: 1200px !important;
    margin: 48px auto !important;
    padding: 0 48px !important;
    background: transparent !important;
}

/* Sort bar */
#cc_lay_sort {
    margin-bottom: 28px !important;
    background: var(--c-white) !important;
    padding: 16px 24px !important;
    border-radius: var(--radius-md) !important;
    box-shadow: var(--shadow-sm) !important;
    border: 1px solid var(--c-border) !important;
}

.liste_box_sort {
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
}

.liste_box_01.ng-binding {
    font-size: 15px !important;
    font-weight: 600 !important;
    color: var(--c-navy-mid) !important;
}

.liste_box_01.ng-binding span {
    color: var(--c-blue) !important;
    font-weight: 800 !important;
}

#sort {
    padding: 9px 16px !important;
    border-radius: var(--radius-sm) !important;
    border: 1.5px solid var(--c-border) !important;
    font-family: var(--font) !important;
    font-size: 14px !important;
    color: var(--c-sub) !important;
    cursor: pointer !important;
    outline: none !important;
    transition: var(--trans-fast) !important;
    background: var(--c-white) !important;
}

#sort:focus, #sort:hover {
    border-color: var(--c-blue) !important;
}

/* Result cards */
.liste_box {
    display: flex !important;
    background: var(--c-white) !important;
    border-radius: var(--radius-lg) !important;
    margin-bottom: 24px !important;
    overflow: hidden !important;
    transition: var(--trans-base) !important;
    box-shadow: var(--shadow-sm) !important;
    border: 1px solid var(--c-border) !important;
}

.liste_box:hover {
    transform: translateY(-6px) !important;
    box-shadow: var(--shadow-lg) !important;
    border-color: var(--c-blue-light) !important;
}

/* Image column */
.liste_box_01 {
    width: 300px !important;
    min-width: 300px !important;
    position: relative !important;
    overflow: hidden !important;
}

.liste_box_01 img[src*="ships/ships"] {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    display: block !important;
    transition: transform 0.6s var(--ease) !important;
}

.liste_box:hover .liste_box_01 img[src*="ships/ships"] {
    transform: scale(1.05) !important;
}

.liste_box_01 img[src*="ships/logos"] {
    position: absolute !important;
    top: 16px !important;
    left: 16px !important;
    background: rgba(255,255,255,0.97) !important;
    padding: 8px 12px !important;
    border-radius: var(--radius-sm) !important;
    max-width: 90px !important;
    max-height: 36px !important;
    object-fit: contain !important;
    box-shadow: var(--shadow-sm) !important;
    z-index: 2 !important;
}

/* Content column */
.liste_box_02 {
    padding: 28px 32px !important;
    flex-grow: 1 !important;
    display: flex !important;
    flex-direction: column !important;
    position: relative !important;
}

/* Nights badge */
.liste_box_nights {
    display: inline-flex !important;
    align-items: center !important;
    background: var(--c-blue-pale) !important;
    color: var(--c-blue) !important;
    padding: 4px 14px !important;
    border-radius: var(--radius-pill) !important;
    font-size: 12px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    margin-bottom: 14px !important;
    letter-spacing: 0.06em !important;
    width: fit-content !important;
}

/* Card title */
.liste_box_headline {
    margin-bottom: 14px !important;
}

.liste_box_headline a {
    text-decoration: none !important;
    color: var(--c-navy) !important;
    font-size: 20px !important;
    font-weight: 700 !important;
    line-height: 1.3 !important;
    letter-spacing: -0.02em !important;
    transition: color 0.2s ease !important;
}

.liste_box_headline a:hover {
    color: var(--c-blue) !important;
}

.liste_box_headline em {
    display: block !important;
    font-style: normal !important;
    color: var(--c-navy) !important;
}

/* Detail text */
.liste_box_text {
    color: var(--c-sub) !important;
    font-size: 14px !important;
    line-height: 1.65 !important;
    margin-bottom: 20px !important;
}

.liste_box_text p {
    margin: 0 0 4px !important;
    color: var(--c-sub) !important;
    font-size: 14px !important;
}

.liste_box_text p strong {
    color: var(--c-navy-mid) !important;
    font-weight: 600 !important;
}

/* Price */
.liste_box_preis {
    font-size: 14px !important;
    color: var(--c-sub) !important;
    margin-bottom: 16px !important;
    margin-top: auto !important;
}

.liste_box_preis span {
    font-size: 28px !important;
    font-weight: 800 !important;
    color: var(--c-navy) !important;
    letter-spacing: -0.03em !important;
    display: inline-block !important;
    margin-left: 4px !important;
}

/* See Offers CTA */
.b_forward {
    display: inline-flex !important;
}

.b_forward a {
    display: inline-flex !important;
    align-items: center !important;
    gap: 8px !important;
    background: var(--c-blue) !important;
    color: var(--c-white) !important;
    padding: 12px 24px !important;
    border-radius: var(--radius-pill) !important;
    font-weight: 700 !important;
    font-size: 14px !important;
    text-decoration: none !important;
    transition: var(--trans-base) !important;
    box-shadow: var(--shadow-blue) !important;
}

.b_forward a:hover {
    background: #1D4ED8 !important;
    transform: translateY(-2px) !important;
    box-shadow: 0 12px 28px rgba(37,99,235,0.35) !important;
}

.b_forward a b {
    font-weight: 700 !important;
}

.b_forward a i {
    font-style: normal !important;
    opacity: 0.8 !important;
    font-size: 13px !important;
}

/* Wishlist button */
.button_favor a {
    width: 40px !important;
    height: 40px !important;
    border-radius: 50% !important;
    border: 1.5px solid var(--c-border) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    transition: var(--trans-fast) !important;
    background: var(--c-white) !important;
}

.button_favor a:hover {
    border-color: var(--c-blue) !important;
    background: var(--c-blue-pale) !important;
}

/* Load more */
#b_forward_iframe a {
    display: inline-flex !important;
    align-items: center !important;
    gap: 8px !important;
    background: transparent !important;
    color: var(--c-blue) !important;
    border: 2px solid var(--c-blue) !important;
    padding: 14px 32px !important;
    border-radius: var(--radius-pill) !important;
    font-weight: 700 !important;
    font-size: 15px !important;
    text-decoration: none !important;
    transition: var(--trans-base) !important;
}

#b_forward_iframe a:hover {
    background: var(--c-blue) !important;
    color: var(--c-white) !important;
    box-shadow: var(--shadow-blue) !important;
}

/* Loader */
.loader {
    border: 3px solid var(--c-border) !important;
    border-top-color: var(--c-blue) !important;
    border-radius: 50% !important;
    width: 40px !important;
    height: 40px !important;
    animation: spin 0.8s linear infinite !important;
    margin: 40px auto !important;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}


/* ============================================================
   10. SEARCH WIDGET
   ============================================================ */
.lp_ss {
    font-family: var(--font) !important;
    background: var(--c-bg) !important;
    padding: 48px 0 !important;
}

.lp_ss_box03 {
    background: var(--c-white) !important;
    border-radius: var(--radius-xl) !important;
    box-shadow: var(--shadow-lg) !important;
    padding: 40px 48px !important;
    max-width: 1100px !important;
    margin: 0 auto !important;
    border: 1px solid var(--c-border) !important;
}

/* Section heading inside search */
.lay_01 h2 {
    font-family: var(--font) !important;
    font-size: 32px !important;
    color: var(--c-navy) !important;
    font-weight: 800 !important;
    margin-bottom: 32px !important;
    letter-spacing: -0.03em !important;
    position: relative !important;
    padding-bottom: 20px !important;
    text-align: left !important;
    text-transform: none !important;
}

.lay_01 h2::after {
    content: '' !important;
    position: absolute !important;
    bottom: 0 !important;
    left: 0 !important;
    width: 48px !important;
    height: 3px !important;
    background: var(--c-blue) !important;
    border-radius: 2px !important;
}

/* Search field buttons */
.searchbutton {
    background: var(--c-white) !important;
    color: var(--c-navy-mid) !important;
    border: 1.5px solid var(--c-border) !important;
    border-radius: var(--radius-sm) !important;
    height: 52px !important;

<script>
    (function() {
        /**
         * Forcefully removes absolute positioning from price sections
         * to maintain the premium stacked layout.
         */
        function fixPricePositioning() {
            const selectors = [
                '#cc .lp_trip_box div[class^="price"]',
                '#cc .lp_double_box div[class^="price"]'
            ];

            selectors.forEach(selector => {
                const elements = document.querySelectorAll(selector);
                elements.forEach(el => {
                    // Set to relative and use important to override inline styles or dynamic injections
                    el.style.setProperty('position', 'relative', 'important');
                    // Ensure the order property from our CSS is respected
                    el.style.setProperty('order', '-1', 'important');
                    // Adjust bottom spacing as requested
                    el.style.setProperty('bottom', '2%', 'important');
                });
            });
        }

        // Run on initial load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', fixPricePositioning);
        } else {
            fixPricePositioning();
        }

        // Run a few times shortly after to catch any late-loading widgets or dynamic content
        [500, 1000, 2000, 5000].forEach(delay => {
            setTimeout(fixPricePositioning, delay);
        });

        // Use MutationObserver to catch any dynamic style changes by external scripts
        const observer = new MutationObserver((mutations) => {
            fixPricePositioning();
        });

        observer.observe(document.body || document.documentElement, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style', 'class']
        });
    })();
</script>
