<style>
/* ================================================================
   KARAVAN CRUISES — Design System
   Matching reference: clean white/blue travel site
   Zero class name changes · All !important overrides
   ================================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@400;600;700;800;900&display=swap');

/* ================================================================
   TOKENS
   ================================================================ */
:root {
    /* Brand */
    --blue:          #1566C0 !important;
    --blue-dark:     #0E4F9A !important;
    --blue-light:    #EAF2FF !important;
    --blue-mid:      #2979C8 !important;

    /* Neutrals */
    --white:         #FFFFFF !important;
    --bg:            #F4F7FB !important;
    --bg-section:    #F8FAFD !important;
    --surface:       #FFFFFF !important;
    --border:        #DDE5EF !important;
    --border-light:  #EDF2F8 !important;

    /* Text */
    --text-dark:     #0E1F35 !important;
    --text-mid:      #2D4363 !important;
    --text-body:     #4A6080 !important;
    --text-muted:    #8499B4 !important;

    /* Accent */
    --gold:          #E09500 !important;
    --gold-bg:       #FFF8E6 !important;

    /* Fonts */
    --font-head:     'Nunito Sans', sans-serif !important;
    --font-body:     'Inter', sans-serif !important;

    /* Layout */
    --max-w:         1280px !important;

    /* Radii */
    --r-xs:   6px !important;
    --r-sm:   10px !important;
    --r-md:   14px !important;
    --r-lg:   20px !important;
    --r-xl:   28px !important;
    --r-pill: 999px !important;

    /* Shadows */
    --sh-xs:  0 1px 4px rgba(14,31,53,0.06) !important;
    --sh-sm:  0 2px 10px rgba(14,31,53,0.07), 0 1px 3px rgba(14,31,53,0.04) !important;
    --sh-md:  0 6px 20px rgba(14,31,53,0.09), 0 2px 6px rgba(14,31,53,0.05) !important;
    --sh-lg:  0 12px 36px rgba(14,31,53,0.11), 0 4px 12px rgba(14,31,53,0.06) !important;
    --sh-xl:  0 24px 56px rgba(14,31,53,0.14), 0 8px 20px rgba(14,31,53,0.07) !important;
    --sh-blue: 0 6px 20px rgba(21,102,192,0.3) !important;

    /* Transitions */
    --ease:   cubic-bezier(0.4, 0, 0.2, 1) !important;
    --t-fast: all 0.16s cubic-bezier(0.4,0,0.2,1) !important;
    --t-base: all 0.26s cubic-bezier(0.4,0,0.2,1) !important;
    --t-slow: all 0.42s cubic-bezier(0.4,0,0.2,1) !important;
}


/* ================================================================
   BASE
   ================================================================ */
*, *::before, *::after {
    box-sizing: border-box !important;
}

body {
    font-family: var(--font-body) !important;
    color: var(--text-body) !important;
    background: var(--bg) !important;
    -webkit-font-smoothing: antialiased !important;
    -moz-osx-font-smoothing: grayscale !important;
    font-size: 14px !important;
    line-height: 1.6 !important;
}


/* ================================================================
   HEADER — TOP BAR  (matches screenshot: dark bar, phone/email right)
   ================================================================ */
.top-bar {
    background: var(--text-dark) !important;
    color: rgba(255,255,255,0.72) !important;
    padding: 7px 48px !important;
    display: flex !important;
    justify-content: flex-end !important;
    align-items: center !important;
    gap: 24px !important;
    font-family: var(--font-body) !important;
    font-size: 12.5px !important;
    font-weight: 400 !important;
    letter-spacing: 0.01em !important;
}

.top-bar span {
    display: flex !important;
    align-items: center !important;
    gap: 6px !important;
    transition: var(--t-fast) !important;
    cursor: default !important;
}

.top-bar span:hover {
    color: rgba(255,255,255,0.95) !important;
}


/* ================================================================
   NAVBAR  (white bar, logo left, nav center, book-now right)
   ================================================================ */
.navbar {
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    padding: 0 48px !important;
    height: 68px !important;
    background: var(--white) !important;
    box-shadow: 0 1px 0 var(--border), 0 2px 12px rgba(14,31,53,0.06) !important;
    font-family: var(--font-body) !important;
    position: sticky !important;
    top: 0 !important;
    z-index: 1000 !important;
}

/* Logo */
.logo a {
    font-family: var(--font-head) !important;
    font-size: 20px !important;
    font-weight: 900 !important;
    color: var(--text-dark) !important;
    text-decoration: none !important;
    letter-spacing: -0.03em !important;
    display: flex !important;
    align-items: center !important;
    gap: 2px !important;
}

/* Nav links */
.menu {
    list-style: none !important;
    display: flex !important;
    align-items: center !important;
    gap: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    height: 100% !important;
}

.menu > li {
    position: relative !important;
    height: 100% !important;
    display: flex !important;
    align-items: center !important;
}

.menu > li > a {
    font-family: var(--font-body) !important;
    text-decoration: none !important;
    color: var(--text-mid) !important;
    font-weight: 600 !important;
    font-size: 13.5px !important;
    padding: 8px 14px !important;
    border-radius: var(--r-xs) !important;
    transition: var(--t-fast) !important;
    white-space: nowrap !important;
    letter-spacing: -0.01em !important;
    display: flex !important;
    align-items: center !important;
    gap: 4px !important;
}

.menu > li > a:hover,
.menu > li:hover > a {
    color: var(--blue) !important;
    background: var(--blue-light) !important;
}

/* Dropdown */
.submenu {
    position: absolute !important;
    top: calc(100% + 8px) !important;
    left: 0 !important;
    background: var(--white) !important;
    min-width: 200px !important;
    list-style: none !important;
    padding: 6px !important;
    margin: 0 !important;
    box-shadow: var(--sh-xl) !important;
    border-radius: var(--r-md) !important;
    border: 1px solid var(--border-light) !important;
    opacity: 0 !important;
    visibility: hidden !important;
    transform: translateY(6px) !important;
    transition: var(--t-base) !important;
}

.menu li:hover .submenu {
    opacity: 1 !important;
    visibility: visible !important;
    transform: translateY(0) !important;
}

.submenu li a {
    font-family: var(--font-body) !important;
    padding: 9px 14px !important;
    display: block !important;
    text-decoration: none !important;
    color: var(--text-body) !important;
    font-size: 13.5px !important;
    font-weight: 500 !important;
    border-radius: var(--r-xs) !important;
    transition: var(--t-fast) !important;
}

.submenu li a:hover {
    background: var(--bg-section) !important;
    color: var(--blue) !important;
    padding-left: 18px !important;
}

/* Book Now button */
.btn {
    font-family: var(--font-body) !important;
    background: var(--blue) !important;
    color: var(--white) !important;
    padding: 10px 22px !important;
    border-radius: var(--r-pill) !important;
    text-decoration: none !important;
    font-weight: 700 !important;
    font-size: 13.5px !important;
    letter-spacing: 0.01em !important;
    transition: var(--t-base) !important;
    box-shadow: var(--sh-blue) !important;
    white-space: nowrap !important;
    display: inline-flex !important;
    align-items: center !important;
}

.btn:hover {
    background: var(--blue-dark) !important;
    transform: translateY(-1px) !important;
    box-shadow: 0 10px 28px rgba(21,102,192,0.38) !important;
}


/* ================================================================
   SECTION HEADING  (popularplacesheading)
   Matches: bold left-aligned title, small uppercase sub-label
   ================================================================ */
.cc-widget--content {
    font-family: var(--font-body) !important;
    padding-top: 56px !important;
    padding-bottom: 16px !important;
    background: var(--white) !important;
}

.textbox {
    max-width: var(--max-w) !important;
    margin: 0 auto !important;
    padding: 0 48px !important;
}

.textbox h2 {
    font-family: var(--font-head) !important;
    font-size: clamp(26px, 3vw, 38px) !important;
    font-weight: 800 !important;
    color: var(--text-dark) !important;
    margin: 0 !important;
    line-height: 1.15 !important;
    letter-spacing: -0.025em !important;
}

.textbox p {
    margin-top: 8px !important;
    margin-bottom: 0 !important;
}

.textbox p span {
    font-family: var(--font-body) !important;
    font-size: 12px !important;
    color: var(--text-muted) !important;
    font-weight: 500 !important;
    display: flex !important;
    align-items: center !important;
    gap: 10px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
}

.textbox p span::before {
    content: '' !important;
    width: 24px !important;
    height: 2px !important;
    background: var(--blue) !important;
    display: inline-block !important;
    border-radius: 2px !important;
    flex-shrink: 0 !important;
    transition: width 0.35s var(--ease) !important;
}

.textbox:hover p span::before {
    width: 40px !important;
}


/* ================================================================
   CRUISE GRID CARDS  (cruisegrid)
   Matches screenshot: photo cards with price tag top-left,
   cruise name + dates bottom-left, 3-column layout
   ================================================================ */
.cc-widget--panel {
    background: var(--white) !important;
    padding: 8px 0 64px !important;
    font-family: var(--font-body) !important;
}

.lp_trip {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 20px !important;
    max-width: var(--max-w) !important;
    margin: 0 auto 20px auto !important;
    padding: 0 48px !important;
}

.lp_trip_box {
    background-size: cover !important;
    background-position: center !important;
    height: 240px !important;
    border-radius: var(--r-lg) !important;
    overflow: hidden !important;
    position: relative !important;
    transition: var(--t-slow) !important;
    box-shadow: var(--sh-sm) !important;
    cursor: pointer !important;
}

/* Gradient overlay — photo shows top, info readable at bottom */
.lp_trip_box::before {
    content: '' !important;
    position: absolute !important;
    inset: 0 !important;
    background: linear-gradient(
        180deg,
        rgba(10,22,40,0.08) 0%,
        rgba(10,22,40,0.00) 30%,
        rgba(10,22,40,0.00) 45%,
        rgba(10,22,40,0.72) 100%
    ) !important;
    z-index: 1 !important;
    transition: var(--t-base) !important;
}

.lp_trip_box:hover {
    transform: translateY(-6px) !important;
    box-shadow: var(--sh-lg) !important;
}

.lp_trip_box:hover::before {
    background: linear-gradient(
        180deg,
        rgba(10,22,40,0.05) 0%,
        rgba(10,22,40,0.00) 35%,
        rgba(10,22,40,0.00) 45%,
        rgba(10,22,40,0.80) 100%
    ) !important;
}

.lp_trip_box a {
    display: flex !important;
    flex-direction: column !important;
    height: 100% !important;
    width: 100% !important;
    text-decoration: none !important;
    color: var(--white) !important;
    position: relative !important;
    z-index: 2 !important;
    box-sizing: border-box !important;
}

/* Price badge — top-left, matches screenshot style exactly */
.lp_trip_box .price {
    order: -1 !important;
    position: relative !important;
    background: rgba(255,255,255,0.96) !important;
    color: var(--text-dark) !important;
    padding: 10px 16px 10px !important;
    font-family: var(--font-body) !important;
    font-weight: 500 !important;
    font-size: 11px !important;
    line-height: 1.35 !important;
    width: fit-content !important;
    border-radius: 0 0 var(--r-md) 0 !important;
    box-shadow: var(--sh-xs) !important;
    clip-path: none !important;
    transition: background 0.2s ease !important;
    letter-spacing: 0.01em !important;
}

.lp_trip_box .price span {
    display: block !important;
    font-family: var(--font-head) !important;
    font-size: 22px !important;
    font-weight: 900 !important;
    line-height: 1.1 !important;
    margin: 2px 0 0 !important;
    color: var(--blue) !important;
    letter-spacing: -0.03em !important;
}

.lp_trip_box:hover .price {
    background: rgba(255,255,255,1) !important;
}

/* Cruise line label */
.lp_trip_box .headline {
    margin-top: auto !important;
    padding: 0 16px 4px !important;
}

.lp_trip_box .headline span {
    font-family: var(--font-body) !important;
    font-size: 10.5px !important;
    font-weight: 600 !important;
    color: rgba(255,255,255,0.75) !important;
    text-transform: uppercase !important;
    letter-spacing: 0.1em !important;
}

/* Trip name + dates */
.lp_trip_box .text {
    padding: 0 16px 18px !important;
}

.lp_trip_box .text div {
    font-family: var(--font-head) !important;
    font-size: 16px !important;
    font-weight: 800 !important;
    line-height: 1.25 !important;
    color: var(--white) !important;
    margin-bottom: 5px !important;
    letter-spacing: -0.02em !important;
    text-shadow: 0 1px 4px rgba(10,22,40,0.5) !important;
}

.lp_trip_box .period {
    font-family: var(--font-body) !important;
    font-size: 11.5px !important;
    color: rgba(255,255,255,0.72) !important;
    font-weight: 400 !important;
    display: flex !important;
    align-items: center !important;
    gap: 5px !important;
}

.lp_trip_box .period::before {
    content: '📅' !important;
    font-size: 11px !important;
}


/* ================================================================
   CRUISE LIST CARDS  (cruuisedeatails)
   Matches screenshot: horizontal card, photo left,
   info right, pill badge, price, blue CTA
   ================================================================ */
#cc_lay_page {
    font-family: var(--font-body) !important;
    max-width: 1200px !important;
    margin: 40px auto !important;
    padding: 0 48px !important;
    background-color: transparent !important;
}

/* Sort bar */
#cc_lay_sort {
    margin-bottom: 20px !important;
    background: var(--white) !important;
    padding: 14px 22px !important;
    border-radius: var(--r-md) !important;
    box-shadow: var(--sh-xs) !important;
    border: 1px solid var(--border-light) !important;
}

.liste_box_sort {
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
}

.liste_box_01.ng-binding {
    font-family: var(--font-body) !important;
    font-size: 14px !important;
    font-weight: 600 !important;
    color: var(--text-dark) !important;
}

.liste_box_01.ng-binding span {
    color: var(--blue) !important;
    font-weight: 700 !important;
}

#sort {
    font-family: var(--font-body) !important;
    padding: 8px 14px !important;
    border-radius: var(--r-xs) !important;
    border: 1.5px solid var(--border) !important;
    color: var(--text-body) !important;
    font-size: 13px !important;
    cursor: pointer !important;
    outline: none !important;
    transition: var(--t-fast) !important;
    background: var(--white) !important;
    font-weight: 500 !important;
}

#sort:focus,
#sort:hover {
    border-color: var(--blue) !important;
    box-shadow: 0 0 0 3px rgba(21,102,192,0.1) !important;
}

/* Card */
.liste_box {
    display: flex !important;
    background: var(--white) !important;
    border-radius: var(--r-lg) !important;
    margin-bottom: 16px !important;
    overflow: hidden !important;
    transition: var(--t-base) !important;
    box-shadow: var(--sh-sm) !important;
    border: 1px solid var(--border-light) !important;
    position: relative !important;
}

.liste_box:hover {
    transform: translateY(-4px) !important;
    box-shadow: var(--sh-lg) !important;
    border-color: rgba(21,102,192,0.15) !important;
}

/* Image column */
.liste_box_01 {
    width: 280px !important;
    min-width: 280px !important;
    position: relative !important;
    overflow: hidden !important;
}

.liste_box_01 img[src*="ships/ships"] {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    display: block !important;
    transition: transform 0.5s var(--ease) !important;
}

.liste_box:hover .liste_box_01 img[src*="ships/ships"] {
    transform: scale(1.05) !important;
}

.liste_box_01 img[src*="ships/logos"] {
    position: absolute !important;
    top: 12px !important;
    left: 12px !important;
    background: rgba(255,255,255,0.97) !important;
    padding: 6px 10px !important;
    border-radius: var(--r-xs) !important;
    max-width: 84px !important;
    max-height: 32px !important;
    object-fit: contain !important;
    box-shadow: var(--sh-xs) !important;
    z-index: 2 !important;
}

/* Content column */
.liste_box_02 {
    font-family: var(--font-body) !important;
    padding: 22px 24px !important;
    flex-grow: 1 !important;
    display: flex !important;
    flex-direction: column !important;
    position: relative !important;
}

/* Nights pill */
.liste_box_nights {
    font-family: var(--font-body) !important;
    display: inline-flex !important;
    align-items: center !important;
    background: var(--blue-light) !important;
    color: var(--blue) !important;
    padding: 3px 12px !important;
    border-radius: var(--r-pill) !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    margin-bottom: 10px !important;
    letter-spacing: 0.08em !important;
    width: fit-content !important;
}

/* Card headline */
.liste_box_headline {
    margin-bottom: 10px !important;
}

.liste_box_headline a {
    font-family: var(--font-head) !important;
    text-decoration: none !important;
    color: var(--text-dark) !important;
    font-size: 17px !important;
    font-weight: 800 !important;
    line-height: 1.3 !important;
    letter-spacing: -0.025em !important;
    transition: color 0.16s ease !important;
}

.liste_box_headline a:hover {
    color: var(--blue) !important;
}

.liste_box_headline em {
    display: block !important;
    font-style: normal !important;
    color: var(--text-dark) !important;
}

/* Detail rows */
.liste_box_text {
    font-family: var(--font-body) !important;
    color: var(--text-muted) !important;
    font-size: 13px !important;
    line-height: 1.6 !important;
    margin-bottom: 14px !important;
}

.liste_box_text p {
    margin: 2px 0 !important;
    color: var(--text-muted) !important;
    font-size: 13px !important;
}

.liste_box_text strong {
    color: var(--text-body) !important;
    font-weight: 600 !important;
}

/* Price */
.liste_box_preis {
    font-family: var(--font-body) !important;
    margin-top: auto !important;
    font-size: 12.5px !important;
    color: var(--text-muted) !important;
    padding-top: 12px !important;
    border-top: 1px solid var(--border-light) !important;
}

.liste_box_preis span {
    font-family: var(--font-head) !important;
    display: inline-block !important;
    font-size: 26px !important;
    font-weight: 900 !important;
    color: var(--text-dark) !important;
    margin-left: 4px !important;
    letter-spacing: -0.04em !important;
    line-height: 1 !important;
    vertical-align: middle !important;
}

/* CTA */
.b_forward {
    position: absolute !important;
    bottom: 22px !important;
    right: 22px !important;
}

.b_forward a {
    font-family: var(--font-body) !important;
    background: var(--blue) !important;
    color: var(--white) !important;
    text-decoration: none !important;
    padding: 10px 20px !important;
    border-radius: var(--r-pill) !important;
    font-weight: 700 !important;
    font-size: 13px !important;
    display: inline-flex !important;
    align-items: center !important;
    gap: 6px !important;
    box-shadow: var(--sh-blue) !important;
    transition: var(--t-base) !important;
    letter-spacing: 0.01em !important;
}

.b_forward a:hover {
    background: var(--blue-dark) !important;
    transform: translateY(-1px) !important;
    box-shadow: 0 10px 28px rgba(21,102,192,0.38) !important;
}

.b_forward b {
    font-weight: 700 !important;
}

.b_forward i {
    font-style: normal !important;
    font-size: 13px !important;
    opacity: 0.8 !important;
}

/* Wishlist heart */
.button_favor {
    position: absolute !important;
    top: 22px !important;
    right: 22px !important;
}

#favorButton {
    display: flex !important;
    width: 38px !important;
    height: 38px !important;
    background: var(--bg) !important;
    border-radius: var(--r-sm) !important;
    align-items: center !important;
    justify-content: center !important;
    text-decoration: none !important;
    transition: var(--t-base) !important;
    border: 1.5px solid var(--border) !important;
}

#favorButton:hover {
    background: #FEF2F2 !important;
    border-color: #FECACA !important;
    transform: scale(1.08) !important;
}

#favorButton::before {
    content: '♥' !important;
    color: var(--text-muted) !important;
    font-size: 16px !important;
    line-height: 1 !important;
    transition: color 0.16s ease !important;
}

#favorButton:hover::before {
    color: #EF4444 !important;
}

/* Load more */
#iframe {
    text-align: center !important;
    margin: 36px 0 !important;
}

#b_forward_iframe a {
    font-family: var(--font-body) !important;
    display: inline-flex !important;
    align-items: center !important;
    gap: 8px !important;
    background: transparent !important;
    color: var(--blue) !important;
    border: 2px solid var(--blue) !important;
    text-decoration: none !important;
    padding: 12px 32px !important;
    border-radius: var(--r-pill) !important;
    font-weight: 700 !important;
    font-size: 13.5px !important;
    transition: var(--t-base) !important;
}

#b_forward_iframe a:hover {
    background: var(--blue) !important;
    color: var(--white) !important;
    box-shadow: var(--sh-blue) !important;
    transform: translateY(-1px) !important;
}


/* ================================================================
   SEARCH WIDGET  (search.html)
   Matches screenshot: left panel with dropdowns, blue CTA
   ================================================================ */
.lp_ss {
    font-family: var(--font-body) !important;
    background: var(--bg) !important;
    padding: 0 !important;
}

.lp_ss_box03 {
    background: var(--white) !important;
    border-radius: var(--r-lg) !important;
    box-shadow: var(--sh-md) !important;
    padding: 28px 28px !important;
    max-width: 100% !important;
    margin: 0 !important;
    border: 1px solid var(--border-light) !important;
}

.lay_01 h2 {
    font-family: var(--font-head) !important;
    font-size: 18px !important;
    color: var(--text-dark) !important;
    text-transform: none !important;
    letter-spacing: -0.02em !important;
    font-weight: 800 !important;
    margin-bottom: 20px !important;
    text-align: left !important;
    padding-bottom: 0 !important;
}

.lay_01 h2::after {
    display: none !important;
}

/* Search field buttons — clean white with border */
.searchbutton {
    font-family: var(--font-body) !important;
    background: var(--white) !important;
    color: var(--text-body) !important;
    border: 1.5px solid var(--border) !important;
    border-radius: var(--r-sm) !important;
    height: 46px !important;
    font-size: 13.5px !important;
    font-weight: 500 !important;
    padding: 0 14px !important;
    transition: var(--t-fast) !important;
    cursor: pointer !important;
    text-align: left !important;
    width: 100% !important;
    display: flex !important;
    align-items: center !important;
    outline: none !important;
    box-shadow: none !important;
}

.searchbutton:hover,
.searchbutton:focus {
    border-color: var(--blue) !important;
    background: var(--blue-light) !important;
    box-shadow: 0 0 0 3px rgba(21,102,192,0.08) !important;
}

/* Dropdowns */
.searchlist {
    background: var(--white) !important;
    border-radius: var(--r-md) !important;
    box-shadow: var(--sh-xl) !important;
    border: 1px solid var(--border-light) !important;
    padding: 18px !important;
    margin-top: 6px !important;
    z-index: 9999 !important;
}

/* Chips inside dropdowns */
.helperButton {
    font-family: var(--font-body) !important;
    padding: 6px 14px !important;
    border-radius: var(--r-pill) !important;
    border: 1.5px solid var(--border) !important;
    background: var(--white) !important;
    color: var(--text-body) !important;
    font-weight: 600 !important;
    font-size: 12.5px !important;
    transition: var(--t-fast) !important;
    cursor: pointer !important;
    margin: 3px !important;
}

.helperButton:hover {
    background: var(--blue) !important;
    color: var(--white) !important;
    border-color: var(--blue) !important;
    box-shadow: var(--sh-blue) !important;
}

/* Big blue search button — matches screenshot exactly */
.btnSearch {
    font-family: var(--font-body) !important;
    background: var(--blue) !important;
    color: var(--white) !important;
    border-radius: var(--r-md) !important;
    height: 50px !important;
    font-size: 15px !important;
    font-weight: 700 !important;
    text-transform: none !important;
    letter-spacing: -0.01em !important;
    width: 100% !important;
    border: none !important;
    cursor: pointer !important;
    transition: var(--t-base) !important;
    box-shadow: var(--sh-blue) !important;
    margin-top: 12px !important;
}

.btnSearch:hover {
    background: var(--blue-dark) !important;
    transform: translateY(-1px) !important;
    box-shadow: 0 10px 28px rgba(21,102,192,0.4) !important;
}

/* Datepicker */
.datepicker--cell.-selected-,
.datepicker--cell.-selected-.-current- {
    background: var(--blue) !important;
    color: var(--white) !important;
    border-radius: var(--r-xs) !important;
}

.datepicker--cell.-current- {
    color: var(--blue) !important;
    font-weight: 700 !important;
}

.datepicker--cell:hover:not(.-selected-) {
    background: var(--blue-light) !important;
    border-radius: var(--r-xs) !important;
    color: var(--blue) !important;
}

.datepicker--nav-title,
.datepicker--nav-action {
    font-family: var(--font-body) !important;
    color: var(--text-dark) !important;
    font-weight: 600 !important;
}

/* Search hero slider */
.lp_ss_box04 {
    border-radius: var(--r-lg) !important;
    overflow: hidden !important;
    box-shadow: var(--sh-md) !important;
}

.lp_ss_box04 .lp_slider_box {
    border-radius: 0 !important;
}


/* ================================================================
   IMAGE SLIDER (Slider.html)
   ================================================================ */
.cc-widget--carousel {
    background: var(--white) !important;
    padding: 16px 0 60px !important;
    font-family: var(--font-body) !important;
}

.swiper {
    padding: 24px 16px 64px !important;
    overflow: visible !important;
}

.lp_slider_box {
    height: 400px !important;
    background-size: cover !important;
    background-position: center !important;
    border-radius: var(--r-lg) !important;
    box-shadow: var(--sh-md) !important;
    transition: var(--t-slow) !important;
    cursor: pointer !important;
    position: relative !important;
    overflow: hidden !important;
}

.lp_slider_box::before {
    content: '' !important;
    position: absolute !important;
    inset: 0 !important;
    background: linear-gradient(to bottom, transparent 55%, rgba(10,22,40,0.45) 100%) !important;
    z-index: 1 !important;
    opacity: 0.7 !important;
    transition: opacity 0.28s ease !important;
}

.lp_slider_box:hover {
    transform: translateY(-8px) !important;
    box-shadow: var(--sh-xl) !important;
}

.lp_slider_box:hover::before {
    opacity: 0.45 !important;
}

.swiper-slide-active .lp_slider_box {
    transform: scale(1.04) !important;
    box-shadow: var(--sh-xl) !important;
    z-index: 10 !important;
    outline: 2px solid var(--blue) !important;
    outline-offset: 4px !important;
}

/* Swiper nav */
.swiper-button-next,
.swiper-button-prev {
    width: 46px !important;
    height: 46px !important;
    background: var(--white) !important;
    color: var(--blue) !important;
    border-radius: 50% !important;
    box-shadow: var(--sh-md) !important;
    transition: var(--t-base) !important;
    border: 1px solid var(--border) !important;
}

.swiper-button-next:hover,
.swiper-button-prev:hover {
    background: var(--blue) !important;
    color: var(--white) !important;
    transform: scale(1.08) !important;
    box-shadow: var(--sh-blue) !important;
    border-color: var(--blue) !important;
}

.swiper-button-next::after,
.swiper-button-prev::after {
    font-size: 15px !important;
    font-weight: 900 !important;
}

/* Pagination */
.swiper-pagination {
    bottom: 20px !important;
}

.swiper-pagination-bullet {
    width: 7px !important;
    height: 7px !important;
    background: var(--border) !important;
    opacity: 1 !important;
    border-radius: var(--r-pill) !important;
    transition: var(--t-base) !important;
    margin: 0 4px !important;
}

.swiper-pagination-bullet-active {
    width: 22px !important;
    background: var(--blue) !important;
}

    }

    .liste_box_01 {
        width: 100% !important;
        min-width: unset !important;

    }

    .b_forward {
        position: static !important;
        margin-top: 16px !important;
    }

    .b_forward a {
        justify-content: center !important;
        width: 100% !important;
    }

    .button_favor {

        bottom: 16px !important;
    }

    .liste_box_02 { padding: 16px !important; }

    .lp_slider_box { height: 260px !important; }

<script>
    (function() {
        /**
         * Forcefully removes absolute positioning from price sections
         * to maintain the premium stacked layout.
         */
        function fixPricePositioning() {
            const selectors = [
                '#cc .lp_trip_box div[class^="price"]',
                '#cc .lp_double_box div[class^="price"]'
            ];

            selectors.forEach(selector => {
                const elements = document.querySelectorAll(selector);
                elements.forEach(el => {
                    // Set to relative and use important to override inline styles or dynamic injections
                    el.style.setProperty('position', 'relative', 'important');
                    // Ensure the order property from our CSS is respected
                    el.style.setProperty('order', '-1', 'important');
                    // Adjust bottom spacing as requested
                    el.style.setProperty('bottom', '2%', 'important');
                });
            });
        }

        // Run on initial load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', fixPricePositioning);
        } else {
            fixPricePositioning();
        }

        // Run a few times shortly after to catch any late-loading widgets or dynamic content
        [500, 1000, 2000, 5000].forEach(delay => {
            setTimeout(fixPricePositioning, delay);
        });

        // Use MutationObserver to catch any dynamic style changes by external scripts
        const observer = new MutationObserver((mutations) => {
            fixPricePositioning();
        });

        observer.observe(document.body || document.documentElement, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style', 'class']
        });
    })();
</script>
